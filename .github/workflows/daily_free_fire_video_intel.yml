name: Daily Free Fire Video Intel

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install optional dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check configured sources
        run: |
          python scripts/check_sources.py --sources sources.yaml --timeout 20 --output knowledge_base/source-check.md || true

      - name: Run free collector
        run: |
          python -m fire_video_intel.main --mode daily --sources sources.yaml --output knowledge_base --database data/intel.sqlite

      - name: Build GitHub Pages site
        run: |
          python scripts/build_site.py --knowledge-base knowledge_base --site-dir _site

      - name: Commit generated intelligence files
        run: |
          git config user.name "fire-intel-bot"
          git config user.email "fire-intel-bot@example.com"
          git add data knowledge_base
          git commit -m "chore: update free fire video intelligence" || echo "No changes"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
