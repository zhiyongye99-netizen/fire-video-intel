name: Daily Free Fire Video Intel

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install optional dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check configured sources
        run: |
          python scripts/check_sources.py --sources sources.yaml --timeout 20 --output knowledge_base/source-check.md || true

      - name: Run free collector
        run: |
          python -m fire_video_intel.main --mode daily --sources sources.yaml --output knowledge_base --database data/intel.sqlite

      - name: Commit generated intelligence files
        run: |
          git config user.name "fire-intel-bot"
          git config user.email "fire-intel-bot@example.com"
          git add data knowledge_base
          git commit -m "chore: update free fire video intelligence" || echo "No changes"
          git push
